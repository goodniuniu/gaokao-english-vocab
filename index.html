  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;

  header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    color:#fff;display:grid;place-items:center;font-weight:800;font-size:15px}
  h1{font-size:19px;margin:0}
  .tag{font-size:12px;color:var(--sub);margin:0 0 14px}
  .tag b{color:var(--brand)}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center;box-shadow:var(--shadow)}
  .stat .n{font-size:18px;font-weight:800;color:var(--brand)}
  .stat .l{font-size:11px;color:var(--sub)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
  .modes{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .mode{display:flex;flex-direction:column;gap:2px;padding:13px 14px;border:1px solid var(--line);border-radius:13px;
    background:#fbfdff;cursor:pointer;transition:.15s;text-align:left}
  .mode:hover{border-color:var(--brand);transform:translateY(-1px)}
  .mode .t{font-weight:700;font-size:15px}
  .mode .d{font-size:12px;color:var(--sub)}
  .hidden{display:none!important}
  .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px;color:var(--sub)}
  .qhead .bar{flex:1;height:8px;background:var(--line);border-radius:6px;margin:0 10px;overflow:hidden}
  .qhead .bar i{display:block;height:100%;background:var(--brand);width:0;transition:.3s}
  .prompt{font-size:22px;font-weight:800;text-align:center;margin:14px 0 4px}
  .prompt .ph{color:var(--sub);font-size:15px;font-weight:600}
  .prompt .zh{font-size:20px}
  .opts{display:grid;gap:10px;margin:14px 0}
  .opt{border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:#fff;cursor:pointer;font-size:16px;transition:.12s}
  .opt:hover{border-color:var(--brand)}
  .opt.correct{background:#e7faf3;border-color:var(--ok);color:#0b7a5e}
  .opt.wrong{background:#ffecec;border-color:var(--warn);color:#b3261e}
  .opt.dim{opacity:.5}
  .explain{background:#f3f7ff;border-left:3px solid var(--brand);border-radius:8px;padding:10px 12px;font-size:14px;margin:10px 0}
  .explain .w{font-weight:700}
  .row{display:flex;gap:10px;margin-top:12px}
  .btn{flex:1;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;background:var(--brand);color:#fff}
  .btn.ghost{background:#eef2f8;color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  input.spell{width:100%;padding:13px 14px;font-size:17px;border:1px solid var(--line);border-radius:12px;margin:12px 0;outline:none}
  input.spell:focus{border-color:var(--brand)}
  .result{text-align:center;padding:8px 0}
  .result .score{font-size:42px;font-weight:900;color:var(--brand)}
  .result .sub{color:var(--sub);margin-bottom:8px}
  .wb-item{border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px}
  .wb-item .w{font-weight:800;font-size:16px}
  .wb-item .m{color:var(--sub);font-size:13px}
  .wb-item .ph{color:var(--brand);font-size:13px}
  .flash{text-align:center;cursor:pointer;min-height:150px;display:flex;flex-direction:column;justify-content:center}
  .flash .word{font-size:30px;font-weight:900}
  .flash .ph{color:var(--brand);font-size:16px;margin-top:4px}
  .flash .pos{color:var(--sub);font-size:13px;margin-top:8px}
  .flash .mean{font-size:22px;margin-top:8px;color:var(--brand2);font-weight:800}
  .flash .hint{color:var(--sub);font-size:12px;margin-top:14px}
  .flipbtns{display:flex;gap:10px;margin-top:8px}
  .center{text-align:center}
  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:18px}
  footer b{color:var(--brand)}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#1f2733;color:#fff;
    padding:10px 18px;border-radius:20px;font-size:14px;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>

        <button class="mode" onclick="startMode('smart')"><span class="t">🎲 智能组卷</span><span class="d">随机10题混刷</span></button>
        <button class="mode" onclick="startMode('wrong')"><span class="t">📕 错题复习</span><span class="d">只练错过的新题</span></button>
      </div>
    </div>
    <div class="card center">
      <button class="mode" style="width:100%;background:#fff" onclick="showWrong()"><span class="t">查看错题本</span><span class="d" id="wbCount">共 0 条 · 点击管理</span></button>
    </div>
  </div>

  <!-- 练习 -->
  <div id="quiz" class="hidden">
    <div class="card">
      <div class="qhead">
        <span id="qIdx">1/10</span>
        <span class="bar"><i id="qBar"></i></span>
        <span id="qMode">练习</span>
      </div>
      <div class="prompt" id="qPrompt"></div>
      <div class="opts" id="qOpts"></div>
      <input class="spell hidden" id="qSpell" placeholder="输入英文单词，回车提交" autocomplete="off" />
      <div class="explain hidden" id="qExplain"></div>
      <div class="row">
        <button class="btn ghost" onclick="goHome()">退出</button>
        <button class="btn" id="qNext" disabled onclick="nextQuestion()">下一题</button>
      </div>
    </div>
  </div>

  <!-- 结果 -->
  <div id="result" class="hidden">
    <div class="card result">
      <div class="score" id="rScore">0/10</div>
      <div class="sub" id="rSub"></div>
      <div class="explain" id="rBest"></div>
      <div class="row">
        <button class="btn ghost" onclick="goHome()">返回首页</button>
        <button class="btn" onclick="retry()">再来一组</button>
      </div>
    </div>
  </div>

  <!-- 错题本 -->
  <div id="wrongbook" class="hidden">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong>错题本</strong>
        <button class="btn ghost" style="flex:0;padding:8px 12px;font-size:13px" onclick="clearWrong()">清空</button>
      </div>
      <div id="wbList"></div>
      <div class="row"><button class="btn" onclick="goHome()">返回首页</button></div>
    </div>
  </div>

  <!-- 卡片 -->
  <div id="flash" class="hidden">
    <div class="card">
      <div class="qhead"><span id="fIdx">1/0</span><span class="bar"><i id="fBar"></i></span><span>卡片学习</span></div>

        <div class="ph" id="fPh"></div>
        <div class="pos" id="fPos"></div>
        <div class="mean hidden" id="fMean"></div>

      </div>
      <div class="flipbtns">
        <button class="btn ghost" onclick="flashNav(-1)">上一个</button>
        <button class="btn" onclick="flashNav(1)">下一个</button>
      </div>
    </div>
  </div>

  <footer>由 <b>WorkBuddy 混元 Hy3</b> 生成 · 数据存于本地浏览器，刷新不丢失</footer>
</div>

const BANK = RAW.map(([word,phonetic,pos,meaning])=>({word,phonetic,pos,meaning}));
const TOTAL = BANK.length;

/* ===== 工具 ===== */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function randInt(n){return Math.floor(Math.random()*n);}
function pick(arr){return arr[randInt(arr.length)];}
const $ = id => document.getElementById(id);

/* ===== 题目生成引擎 ===== */
function genMC(mode, fixedWord){
  const target = fixedWord || pick(BANK);
  const pool = BANK.filter(w => w.word !== target.word);
  const wrong = shuffle(pool).slice(0,3);
  let correctText, options;
  if(mode === 'meaning'){
    correctText = target.meaning;
    options = [target.meaning, ...wrong.map(w => w.meaning)];
  } else { // word
    correctText = target.word;
    options = [target.word, ...wrong.map(w => w.word)];
  }
  const opts = shuffle(options);
  const answer = opts.indexOf(correctText);
  return {kind:'mc', mode, target, options:opts, answer};
}
function genSpell(fixedWord){
  const target = fixedWord || pick(BANK);
  return {kind:'spell', target, answer:target.word};
}
function makeQuestion(mode, fixedWord){
  if(mode === 'spell') return genSpell(fixedWord);
  return genMC(mode, fixedWord);
}

/* ===== 状态 ===== */
let session = [], qIdx = 0, correctCount = 0, wrongThisRound = [], currentMode = 'smart';
const LS_W = 'wb_vocab_wrong', LS_B = 'wb_vocab_best', LS_D = 'wb_vocab_done';

function getWrong(){ try{return JSON.parse(localStorage.getItem(LS_W)||'{}');}catch(e){return {};} }
function setWrong(o){ localStorage.setItem(LS_W, JSON.stringify(o)); }
function getBest(){ try{return JSON.parse(localStorage.getItem(LS_B)||'{}');}catch(e){return {};} }
function getDone(){ return parseInt(localStorage.getItem(LS_D)||'0',10); }

/* ===== 首页统计 ===== */
function refreshStats(){
  const wb = getWrong(); const wc = Object.keys(wb).length;
  const best = getBest();
  const bestList = Object.values(best).filter(v=>typeof v==='number');
  const bestPct = bestList.length ? Math.max(...bestList) : null;
  $('sTotal').textContent = TOTAL;
  $('sWrong').textContent = wc;
  $('sDone').textContent = getDone();
  $('sBest').textContent = bestPct==null ? '—' : bestPct + '%';
  $('wbCount').textContent = '共 ' + wc + ' 条 · 点击管理';
}

/* ===== 模式入口 ===== */
function startMode(mode){
  currentMode = mode;
  session = [];
  if(mode === 'flash'){ return startFlash(); }
  if(mode === 'wrong'){
    const wb = getWrong(); const keys = Object.keys(wb);
    if(keys.length === 0){ toast('错题本还是空的，先去练几组吧～'); return; }
    const picked = shuffle(keys).slice(0, Math.min(10, keys.length));
    picked.forEach(k => session.push(makeQuestion(pick(['meaning','word','spell']), BANK.find(w=>w.word===k))));
  } else if(mode === 'smart'){
    const modes = ['meaning','word','spell'];
    for(let i=0;i<10;i++) session.push(makeQuestion(pick(modes)));
  } else {
    for(let i=0;i<10;i++) session.push(makeQuestion(mode));
  }
  qIdx = 0; correctCount = 0; wrongThisRound = [];
  show('quiz');
  renderQuestion();
}
function renderQuestion(){
  const q = session[qIdx];
  $('qIdx').textContent = (qIdx+1) + '/' + session.length;
  $('qBar').style.width = (qIdx/session.length*100) + '%';
  $('qMode').textContent = ({meaning:'词义选择',word:'单词选择',spell:'拼写练习',smart:'智能组卷'})[currentMode] || '练习';
  const p = $('qPrompt'), o = $('qOpts'), sp = $('qSpell'), ex = $('qExplain');
  ex.classList.add('hidden'); ex.innerHTML=''; o.innerHTML=''; sp.classList.add('hidden'); sp.value='';
  $('qNext').disabled = true;
  if(q.kind === 'spell'){
    p.innerHTML = '<div class="zh">'+q.target.meaning+'</div><div class="ph">'+q.target.phonetic+'</div>';
    sp.classList.remove('hidden'); sp.focus();
    sp.onkeydown = e=>{ if(e.key==='Enter') submitSpell(); };
  } else {
    if(q.mode === 'meaning'){
      p.innerHTML = '<div>'+q.target.word+'</div><div class="ph">'+q.target.phonetic+'</div>';
    } else {
      p.innerHTML = '<div class="zh">'+q.target.meaning+'</div>';
    }
    q.options.forEach((opt,i)=>{
      const d = document.createElement('div');
      d.className='opt'; d.textContent=opt; d.onclick=()=>chooseMC(i);
      o.appendChild(d);
    });
  }
}
function chooseMC(i){
  const q = session[qIdx];
  const opts = document.querySelectorAll('#qOpts .opt');
  const isRight = (i === q.answer);
  opts.forEach((el,idx)=>{
    el.onclick=null;
    if(idx === q.answer) el.classList.add('correct');
    else if(idx === i) el.classList.add('wrong');
    else el.classList.add('dim');
  });
  afterAnswer(isRight, q.target.meaning, q.target.word, q.target.phonetic);
}
function submitSpell(){
  const q = session[qIdx];
  const val = $('qSpell').value.trim().toLowerCase();
  const isRight = (val === q.target.word.toLowerCase());
  const sp = $('qSpell');
  sp.disabled = true;
  if(isRight) sp.style.borderColor='var(--ok)'; else sp.style.borderColor='var(--warn)';
  afterAnswer(isRight, q.target.meaning, q.target.word, q.target.phonetic);
}
function afterAnswer(isRight, meaning, word, phonetic){
  if(isRight) correctCount++;
  else {
    const wb = getWrong();
    wb[word] = {word, phonetic, meaning, wrong: (wb[word]?wb[word].wrong+1:1)};
    setWrong(wb);
    wrongThisRound.push(word);
  }
  const ex = $('qExplain');
  ex.classList.remove('hidden');
  ex.innerHTML = '<div class="w">'+word+'</div><div class="ph">'+phonetic+'</div><div>'+meaning+'</div>';
  $('qNext').disabled = false;
  refreshStats();
}
function nextQuestion(){
  if(qIdx < session.length-1){ qIdx++; renderQuestion(); }
  else finishQuiz();
}
function finishQuiz(){
  const total = session.length;
  const pct = Math.round(correctCount/total*100);
  // 历史最佳
  const best = getBest();
  const key = currentMode;
  if(!(key in best) || pct > best[key]) best[key] = pct;
  localStorage.setItem(LS_B, JSON.stringify(best));
  // 已练计数
  localStorage.setItem(LS_D, String(getDone()+total));
  $('rScore').textContent = correctCount + '/' + total;
  $('rSub').textContent = '正确率 ' + pct + '%';
  const prev = best[key];
  $('rBest').textContent = (pct >= prev ? '🎉 新纪录！' : '本次最佳保持：'+prev+'%') + ' 模式：' + ({meaning:'词义选择',word:'单词选择',spell:'拼写练习',smart:'智能组卷'})[currentMode];
  show('result');
  refreshStats();
}
function retry(){ startMode(currentMode); }

/* ===== 错题本 ===== */
function showWrong(){
  const wb = getWrong(); const keys = Object.keys(wb);
  const list = $('wbList'); list.innerHTML='';
  if(keys.length === 0){ list.innerHTML='<p class="center">还没有错题，去练一组吧 💪</p>'; }
  else {
    keys.sort().forEach(k=>{
      const w = wb[k];
      const d = document.createElement('div'); d.className='wb-item';
      d.innerHTML = '<div class="w">'+w.word+'</div><div class="ph">'+w.phonetic+' · '+w.pos+'</div><div class="m">'+w.meaning+'</div>';
      list.appendChild(d);
    });
  }
  show('wrongbook');
}
function clearWrong(){
  if(!confirm('确定清空错题本？此操作不可恢复。')) return;
  localStorage.removeItem(LS_W); refreshStats(); showWrong(); toast('已清空');
}

/* ===== 卡片学习 ===== */
let flashList = [], fIdx = 0, flipped = false;
function startFlash(){
  flashList = shuffle(BANK); fIdx = 0; flipped=false;
  $('fIdx').textContent = '1/'+flashList.length;
  $('fBar').style.width = '0%';
  renderFlash(); show('flash');
}
function renderFlash(){
  const w = flashList[fIdx];
  $('fWord').textContent = w.word;
  $('fPh').textContent = w.phonetic;
  $('fPos').textContent = w.pos;
  if(flipped){ $('fMean').classList.remove('hidden'); $('fMean').textContent = w.meaning; $('fHint').textContent='点击返回正面'; }
  else { $('fMean').classList.add('hidden'); $('fHint').textContent='点击卡片看释义'; }
  $('fIdx').textContent = (fIdx+1)+'/'+flashList.length;
  $('fBar').style.width = (fIdx/(flashList.length-1)*100)+'%';
}
function flip(){ flipped=!flipped; renderFlash(); }
function flashNav(d){ fIdx = (fIdx+d+flashList.length)%flashList.length; flipped=false; renderFlash(); }

/* ===== 导航 ===== */
function show(name){
  ['home','quiz','result','wrongbook','flash'].forEach(n=>$(n).classList.toggle('hidden', n!==name));
}
function goHome(){ show('home'); refreshStats(); }

/* ===== toast ===== */
let toastTimer;
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ===== 初始化 ===== */
if(typeof document !== 'undefined' && document.addEventListener){
  document.addEventListener('DOMContentLoaded', refreshStats);
}
